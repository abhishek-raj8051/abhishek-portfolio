<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Abhishek Raj</title>
    <link rel="stylesheet" href="style.css">
    <style>
    .contact-form-section {
        animation: fadeInUp 1.2s cubic-bezier(.25,.8,.25,1);
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .contact-form .input-box input,
    .contact-form .input-box textarea {
        transition: box-shadow 0.3s, border 0.3s, background 0.3s;
    }
    .contact-form .input-box input:focus,
    .contact-form .input-box textarea:focus {
        box-shadow: 0 0 0 2px var(--main-color, #00bfff);
        background: #263045;
        border: 1.5px solid var(--main-color, #00bfff);
    }
    .contact-form .input-box input:hover,
    .contact-form .input-box textarea:hover {
        background: #232b3a;
    }
    .contact-form .btn {
        background: linear-gradient(100deg, var(--main-color) 0%, #007bbf 100%);
        color: #fff;
        padding: 0.85rem 2.5rem;
        border-radius: 0.7rem;
        font-size: 1.18rem;
        text-decoration: none;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 18px 0 rgba(0,0,0,0.13), 0 1.5px 6px 0 var(--main-color, #00bfff);
        display: inline-block;
        font-weight: 700;
        letter-spacing: 1.2px;
        width: 100%;
        margin-top: 0.5rem;
        transition: background 0.35s cubic-bezier(.25,.8,.25,1), box-shadow 0.35s, transform 0.18s, color 0.18s;
        outline: none;
        border-bottom: 3px solid #007bbf;
    }
    .contact-form .btn:hover, .contact-form .btn:focus {
        background: linear-gradient(100deg, #007bbf 0%, var(--main-color) 100%);
        box-shadow: 0 8px 32px 0 var(--main-color, #00bfff), 0 2px 12px 0 #007bbf;
        color: #fff;
        transform: translateY(-4px) scale(1.045);
        outline: none;
    }
    .contact-form .btn:active {
        background: linear-gradient(100deg, var(--main-color) 0%, #007bbf 100%);
        box-shadow: 0 2px 8px 0 var(--main-color, #00bfff);
        color: #fff;
        transform: scale(0.98);
    }
    </style>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo"><h3>Abhi....</h3></a>
        <nav class="navbar">
            <a href="index.html#home">home</a>
            <a href="index.html#about">about</a>
            <a href="index.html#services">services</a>
            <a href="index.html#portfolio">portfolio</a>
            <a href="index.html#skills">my skill</a>
            <a href="contact.html" class="active">contact</a>
        </nav>
    </header>
    <section class="contact-form-section">
    <h1 class="heading" id="contactform"><span style="color:#fff;font-weight:bold;">Contact</span> <span style="color:var(--main-color);font-weight:bold;">Me</span></h1>
        <form class="contact-form" style="max-width: 450px; margin: 2rem auto; background: rgba(30,40,60,0.9); border-radius: 1.2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.15); padding: 2rem 2.5rem;">
            <div class="input-box" style="display: flex; align-items: center; margin-bottom: 1.2rem;">
                <i class='bx bx-user' style="font-size: 1.3rem; color: var(--main-color); margin-right: 0.7rem;"></i>
                <input type="text" name="name" placeholder="Your Name" required style="flex:1; padding: 0.7rem 1rem; border-radius: 0.6rem; border: none; outline: none; background: #222a36; color: #fff; font-size: 1rem;">
            </div>
            <div class="input-box" style="display: flex; align-items: center; margin-bottom: 1.2rem;">
                <i class='bx bx-phone' style="font-size: 1.3rem; color: var(--main-color); margin-right: 0.7rem;"></i>
                <input type="text" name="mobile" placeholder="Mobile Number" required pattern="[0-9]{10,15}" style="flex:1; padding: 0.7rem 1rem; border-radius: 0.6rem; border: none; outline: none; background: #222a36; color: #fff; font-size: 1rem;">
            </div>
            <div class="input-box" style="display: flex; align-items: center; margin-bottom: 1.2rem;">
                <i class='bx bx-envelope' style="font-size: 1.3rem; color: var(--main-color); margin-right: 0.7rem;"></i>
                <input type="email" name="email" placeholder="Gmail" required style="flex:1; padding: 0.7rem 1rem; border-radius: 0.6rem; border: none; outline: none; background: #222a36; color: #fff; font-size: 1rem;">
            </div>
            <div class="input-box" style="display: flex; align-items: center; margin-bottom: 1.2rem;">
                <i class='bx bx-edit' style="font-size: 1.3rem; color: var(--main-color); margin-right: 0.7rem;"></i>
                <input type="text" name="subject" placeholder="Subject" required style="flex:1; padding: 0.7rem 1rem; border-radius: 0.6rem; border: none; outline: none; background: #222a36; color: #fff; font-size: 1rem;">
            </div>
            <div class="input-box" style="display: flex; align-items: flex-start; margin-bottom: 1.5rem;">
                <i class='bx bx-message-square-detail' style="font-size: 1.3rem; color: var(--main-color); margin-right: 0.7rem; margin-top: 0.4rem;"></i>
                <textarea name="message" rows="5" placeholder="Your Message" required style="flex:1; padding: 0.7rem 1rem; border-radius: 0.6rem; border: none; outline: none; background: #222a36; color: #fff; font-size: 1rem; resize: vertical;"></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; letter-spacing: 1px;">Send Message</button>
        </form>
        <div style="text-align:center; margin-top:2rem; color: #aaa; font-size: 0.95rem;">I will get back to you as soon as possible!</div>
        <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="sendmail.js"></script>
        <div style="margin-top:2rem; color:#888; font-size:0.9rem; text-align:center;">
            <b>Note:</b> To enable email delivery, sign up at <a href="https://www.emailjs.com/" target="_blank">EmailJS</a>, set your service/template/user IDs in <code>sendmail.js</code>, and set the recipient to <b>ar9183080@gmail.com</b> in your EmailJS template.
        </div>
    </section>
</body>
</html>
